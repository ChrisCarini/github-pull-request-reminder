# Dependabot configuration:
# https://docs.github.com/en/free-pro-team@latest/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  # Maintain dependencies for npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    ignore:
      # `eslint-plugin-github` only supports `eslint@"^8 || ^9"` (as of v6.0.0).
      # Ignore major version bumps for `eslint` until `eslint-plugin-github`
      # publishes a release that adds support for `eslint@^10`.
      # See: https://github.com/github/eslint-plugin-github
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
